# Production Docker stack — self-hosted (GitLab CI deploy target).
# Usage on server:
#   export CI_REGISTRY_IMAGE=registry.gitlab.example.com/group/iva360
#   export IMAGE_TAG=$CI_COMMIT_SHA
#   docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d

services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-iva360}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/$$S3_BUCKET
      "
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-iva360-media}
    restart: 'no'

  cms:
    image: ${CI_REGISTRY_IMAGE:-iva360}/cms:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/cms/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:?set PAYLOAD_SECRET}
      S3_BUCKET: ${S3_BUCKET:-iva360-media}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    expose:
      - '3333'

  web:
    image: ${CI_REGISTRY_IMAGE:-iva360}/web:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      CMS_INTERNAL_URL: ${CMS_INTERNAL_URL:-http://cms:3333}
      CMS_PUBLIC_URL: ${CMS_PUBLIC_URL:-}
    depends_on:
      - cms
    expose:
      - '3000'

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - '${NGINX_HTTP_PORT:-80}:80'
    configs:
      - source: nginx_default
        target: /etc/nginx/nginx.conf
    depends_on:
      - web
      - cms
    profiles:
      - with-nginx

configs:
  nginx_default:
    content: |
      events { worker_connections 1024; }
      http {
        upstream web { server web:3000; }
        server {
          listen 80;
          location / {
            proxy_pass http://web;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
          }
        }
      }

volumes:
  pgdata:
  minio_data:
